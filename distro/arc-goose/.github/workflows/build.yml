name: arc-goose build

on:
  push:
    branches: [main]
    paths:
      - "distro/arc-goose/**"
      - "mcp-server/**"
      - "backend/**"
      - "frontend/**"
      - ".github/workflows/**"
  pull_request:
    paths:
      - "distro/arc-goose/**"
      - "mcp-server/**"
      - "backend/**"
      - "frontend/**"

jobs:
  mcp-server:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install arc-mcp
        run: |
          python -m pip install --upgrade pip
          pip install ./mcp-server
      - name: Run tests
        run: |
          pip install pytest
          pytest mcp-server/tests -q

  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install backend deps
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt || true
          pip install pytest
      - name: Run tests
        working-directory: backend
        run: pytest -q

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend
        working-directory: frontend
        run: npm ci
      - name: Typecheck + build
        working-directory: frontend
        run: |
          npm run typecheck --if-present
          npm run build

  config-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate YAML
        run: |
          python - <<'PY'
          import yaml, sys, pathlib
          cfg = pathlib.Path("distro/arc-goose/config.yaml").read_text()
          data = yaml.safe_load(cfg)
          required = ["name", "version", "provider", "mcp_servers", "system_prompt_append"]
          missing = [k for k in required if k not in data]
          if missing:
              print(f"missing keys: {missing}"); sys.exit(1)
          # Enforce 500-word cap on system_prompt_append
          words = len(data["system_prompt_append"].split())
          print(f"system_prompt_append words: {words}")
          if words > 500:
              print("system_prompt_append exceeds 500 words"); sys.exit(1)
          PY
      - name: Shellcheck install.sh
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: distro/arc-goose

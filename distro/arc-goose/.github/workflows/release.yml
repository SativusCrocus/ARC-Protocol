name: arc-goose release

on:
  push:
    tags:
      - "arc-goose-v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. 1.0.0)"
        required: true

permissions:
  contents: write
  packages: write

jobs:
  package:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.resolve.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - id: resolve
        run: |
          if [[ -n "${{ inputs.version }}" ]]; then
            echo "version=${{ inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF_NAME#arc-goose-v}" >> $GITHUB_OUTPUT
          fi
      - name: Build tarball
        run: |
          mkdir -p dist
          tar -czf dist/arc-goose-${{ steps.resolve.outputs.version }}.tar.gz \
            --transform "s,^,arc-goose-${{ steps.resolve.outputs.version }}/," \
            distro/arc-goose mcp-server backend frontend orchestrator \
            LICENSE README.md CONTRIBUTING-DISTRO.md
      - name: Compute checksums
        working-directory: dist
        run: sha256sum *.tar.gz > SHA256SUMS
      - uses: actions/upload-artifact@v4
        with:
          name: arc-goose-${{ steps.resolve.outputs.version }}
          path: dist/

  docker:
    runs-on: ubuntu-latest
    needs: package
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: |
            ghcr.io/sativuscrocus/arc-goose-backend:${{ needs.package.outputs.version }}
            ghcr.io/sativuscrocus/arc-goose-backend:latest
      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: frontend/Dockerfile
          push: true
          tags: |
            ghcr.io/sativuscrocus/arc-goose-frontend:${{ needs.package.outputs.version }}
            ghcr.io/sativuscrocus/arc-goose-frontend:latest
      - name: Build and push mcp-server
        uses: docker/build-push-action@v6
        with:
          context: .
          file: mcp-server/Dockerfile
          push: true
          tags: |
            ghcr.io/sativuscrocus/arc-goose-mcp:${{ needs.package.outputs.version }}
            ghcr.io/sativuscrocus/arc-goose-mcp:latest

  publish:
    runs-on: ubuntu-latest
    needs: [package, docker]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: arc-goose-${{ needs.package.outputs.version }}
          path: dist/
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: arc-goose-v${{ needs.package.outputs.version }}
          name: ARC Goose v${{ needs.package.outputs.version }}
          body: |
            ARC Goose v${{ needs.package.outputs.version }} — Bitcoin-native provenance distribution of Goose.

            ## Install
            ```bash
            curl -fsSL https://github.com/SativusCrocus/ARC-Protocol/releases/download/arc-goose-v${{ needs.package.outputs.version }}/arc-goose-${{ needs.package.outputs.version }}.tar.gz | tar -xz
            cd arc-goose-${{ needs.package.outputs.version }}/distro/arc-goose && ./install.sh
            ```

            ## Docker images
            - `ghcr.io/sativuscrocus/arc-goose-backend:${{ needs.package.outputs.version }}`
            - `ghcr.io/sativuscrocus/arc-goose-frontend:${{ needs.package.outputs.version }}`
            - `ghcr.io/sativuscrocus/arc-goose-mcp:${{ needs.package.outputs.version }}`

            License: MIT (ARC Goose) / Apache-2.0 (upstream Goose). See CONTRIBUTING-DISTRO.md.
          files: |
            dist/*.tar.gz
            dist/SHA256SUMS

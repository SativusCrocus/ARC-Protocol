name: Deploy backend to Railway

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "railway.json"
      - ".github/workflows/deploy-backend.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    concurrency:
      group: railway-backend
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: |
          curl -fsSL https://railway.com/install.sh | sh
          echo "$HOME/.railway/bin" >> "$GITHUB_PATH"

      - name: Deploy backend
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          if [ -z "$RAILWAY_TOKEN" ]; then
            echo "::error::RAILWAY_TOKEN secret is not set. Create a project token in Railway (Project → Settings → Tokens) and add it to this repo's Actions secrets."
            exit 1
          fi
          railway up --service arc-protocol --detach

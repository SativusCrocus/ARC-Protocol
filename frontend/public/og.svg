<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="og-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F7931A"/>
      <stop offset="100%" stop-color="#E8820A"/>
    </linearGradient>
    <linearGradient id="og-cyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00F0FF" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#00B4CC" stop-opacity="0.15"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#000000"/>

  <!-- Subtle grid -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <rect width="40" height="40" fill="none" stroke="#ffffff" stroke-opacity="0.02" stroke-width="0.5"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Arc decoration (large, background) -->
  <path
    d="M 200 315 A 280 280 0 1 1 200 34"
    stroke="url(#og-grad)"
    stroke-width="3"
    stroke-linecap="round"
    fill="none"
    opacity="0.15"
  />
  <path
    d="M 200 315 A 240 240 0 1 1 200 74"
    stroke="url(#og-cyan)"
    stroke-width="1"
    stroke-linecap="round"
    fill="none"
    stroke-dasharray="6 10"
    opacity="0.3"
  />

  <!-- Chain nodes -->
  <circle cx="200" cy="80" r="6" fill="#F7931A" opacity="0.4"/>
  <circle cx="430" cy="40" r="4" fill="#F7931A" opacity="0.25"/>
  <circle cx="480" cy="280" r="4" fill="#00F0FF" opacity="0.2"/>
  <circle cx="380" cy="520" r="5" fill="#00F0FF" opacity="0.15"/>
  <circle cx="200" cy="315" r="6" fill="#00F0FF" opacity="0.3"/>

  <!-- Main text -->
  <text
    x="600" y="260"
    text-anchor="middle"
    dominant-baseline="middle"
    font-family="system-ui, -apple-system, sans-serif"
    font-weight="800"
    font-size="120"
    letter-spacing="-4"
    fill="#F7931A"
  >ARC Protocol</text>

  <!-- Subtitle -->
  <text
    x="600" y="340"
    text-anchor="middle"
    dominant-baseline="middle"
    font-family="system-ui, -apple-system, sans-serif"
    font-weight="400"
    font-size="28"
    letter-spacing="1"
    fill="#ffffff"
    fill-opacity="0.4"
  >Bitcoin-native identity and provenance for AI agents</text>

  <!-- Bottom tag line -->
  <text
    x="600" y="520"
    text-anchor="middle"
    font-family="monospace"
    font-size="14"
    letter-spacing="4"
    fill="#ffffff"
    fill-opacity="0.12"
  >BIP-340 SCHNORR  ·  IMMUTABLE INSCRIPTIONS  ·  LIGHTNING SETTLEMENT</text>

  <!-- Border accent -->
  <rect x="0" y="0" width="1200" height="2" fill="url(#og-grad)" opacity="0.6"/>
  <rect x="0" y="628" width="1200" height="2" fill="url(#og-grad)" opacity="0.3"/>
</svg>

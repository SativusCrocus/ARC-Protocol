services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - arc-data:/root/.arc
    environment:
      - OLLAMA_HOST=http://host.docker.internal:11434
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - BACKEND_URL=http://backend:8000
    depends_on:
      backend:
        condition: service_healthy

volumes:
  arc-data:
